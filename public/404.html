<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PharmacyOS</title>
  <script>
    // GitHub Pages SPA redirect.
    // When GH Pages serves this 404.html for a deep link, we encode the path
    // into the query string and redirect to the repo root so React Router
    // can take over. pathSegmentsToKeep=1 preserves '/pharmacyos/'.
    var pathSegmentsToKeep = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
